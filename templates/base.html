<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GitLab → Teams{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="bg-slate-800 border-b border-slate-700">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="text-lg font-bold text-white">GitLab → Teams</a>
      <a href="/" class="text-slate-300 hover:text-white text-sm">Дашборд</a>
      <a href="/polled" class="text-slate-300 hover:text-white text-sm">Опрошенные MR</a>
      <a href="/rules" class="text-slate-300 hover:text-white text-sm">Правила</a>
      <a href="/docs" class="text-slate-400 hover:text-white text-sm ml-auto" target="_blank">API Docs ↗</a>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
