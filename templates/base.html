<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GitLab Manager{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="bg-slate-800 border-b border-slate-700">
    <div class="w-full px-4 py-3 flex items-center gap-x-6 gap-y-2 flex-wrap">
      <a href="/" class="text-lg font-bold text-white shrink-0 whitespace-nowrap">GitLab Manager</a>
      <a href="/" class="text-slate-300 hover:text-white text-sm">Дашборд</a>
      <a href="/polled" class="text-slate-300 hover:text-white text-sm">Опрошенные MR</a>
      <a href="/rules" class="text-slate-300 hover:text-white text-sm">Правила</a>
      <a href="/queue" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Cherry-Pick</a>
      <a href="/compare" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Compare</a>
      <a href="/reports" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Jira Reports</a>
      <a href="/review" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Review</a>
      <a href="/schema" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Schema</a>
      <a href="/database" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Database</a>
      <a href="/sonar" class="text-slate-300 hover:text-white text-sm shrink-0 whitespace-nowrap">Sonar</a>
      <a href="/settings" class="text-slate-300 hover:text-white text-sm">Настройки</a>
      <a href="/docs" class="text-slate-400 hover:text-white text-sm ml-auto" target="_blank">API Docs ↗</a>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
