{% extends "base.html" %}
{% block title %}Очередность — GitLab → Teams{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Очередность Cherry-Pick</h1>

<!-- Ввод MR -->
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6">
  <label class="block text-sm font-medium text-slate-300 mb-2">Список MR (IID через запятую или по одному на строку)</label>
  <textarea id="mr-input" rows="4"
    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none font-mono"
    placeholder="123, 456, 789&#10;или&#10;123&#10;456&#10;789"></textarea>

  <div class="flex gap-3 items-end mt-3 flex-wrap">
    <div>
      <label class="block text-xs text-slate-400 mb-1">Релизная ветка (куда вливать)</label>
      <input type="text" id="target-branch" value=""
        class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-64"
        placeholder="release/99">
    </div>
    <button onclick="loadMRs()" id="load-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Загрузить
    </button>
  </div>
</div>

<!-- Ошибки загрузки -->
<div id="load-errors" class="mb-4 hidden"></div>

<!-- Панель управления -->
<div id="control-panel" class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6 hidden">
  <div class="flex items-center gap-4 flex-wrap">
    <button onclick="saveSession()" id="save-btn"
      class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Сохранить в историю
    </button>
    <span class="ml-auto text-xs text-slate-500" id="stats-line"></span>
  </div>
</div>

<!-- Таблица MR -->
<div id="mr-table" class="hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-700">
          <th class="px-3 py-2 w-8">#</th>
          <th class="px-3 py-2">Исходный MR</th>
          <th class="px-3 py-2">Автор</th>
          <th class="px-3 py-2">Дата мержа</th>
          <th class="px-3 py-2">Статус</th>
          <th class="px-3 py-2 text-right">Действия</th>
        </tr>
      </thead>
      <tbody id="mr-tbody"></tbody>
    </table>
  </div>
</div>

<!-- История -->
<div class="mt-10">
  <h2 class="text-xl font-bold mb-4">История Cherry-Pick</h2>
  <div id="history-list">
    <p class="text-slate-500 text-sm">Загрузка...</p>
  </div>
</div>

<!-- Модальное окно деталей сессии -->
<div id="session-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center">
  <div class="bg-slate-800 border border-slate-700 rounded-lg max-w-3xl w-full mx-4 max-h-[80vh] overflow-y-auto">
    <div class="flex items-center justify-between p-4 border-b border-slate-700">
      <h3 class="text-lg font-semibold" id="modal-title"></h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl cursor-pointer">&times;</button>
    </div>
    <div class="p-4" id="modal-body"></div>
  </div>
</div>

<script>
let loadedMRs = [];
let cherryPickState = {};  // iid -> { branch, mr_url }

async function loadMRs() {
  const input = document.getElementById('mr-input').value.trim();
  if (!input) return;

  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const iids = input
    .split(/[\s,]+/)
    .map(s => parseInt(s.replace(/[^0-9]/g, ''), 10))
    .filter(n => !isNaN(n) && n > 0);

  if (iids.length === 0) {
    alert('Не найдено валидных IID');
    return;
  }

  const btn = document.getElementById('load-btn');
  btn.textContent = 'Загрузка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mr_iids: iids }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      alert(data.detail || 'Ошибка загрузки');
      return;
    }

    loadedMRs = data.mrs;
    cherryPickState = {};
    renderMRs();
    renderErrors(data.errors);

    document.getElementById('control-panel').classList.remove('hidden');
    document.getElementById('mr-table').classList.remove('hidden');
    updateStatsLine();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.textContent = 'Загрузить';
    btn.disabled = false;
  }
}

function renderMRs() {
  const tbody = document.getElementById('mr-tbody');
  tbody.innerHTML = '';
  loadedMRs.forEach((mr, i) => {
    const merged = mr.merged_at ? new Date(mr.merged_at).toLocaleString('ru-RU') : '—';
    const hasCommit = !!mr.merge_commit_sha;
    const cp = cherryPickState[mr.iid];

    const tr = document.createElement('tr');
    tr.className = 'border-b border-slate-700/50 hover:bg-slate-800/50';
    tr.id = `mr-row-${mr.iid}`;

    let statusHtml, actionsHtml;
    if (cp) {
      statusHtml = '<span class="inline-flex items-center bg-green-900/40 text-green-300 border border-green-700 rounded-full px-2 py-0.5 text-xs font-medium">Cherry-picked</span>';
      actionsHtml = `<a href="${cp.mr_url}" target="_blank"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer inline-block">
        Открыть MR</a>`;
    } else if (!hasCommit) {
      statusHtml = '<span class="text-slate-500 text-xs">Нет merge commit</span>';
      actionsHtml = '';
    } else {
      statusHtml = '<span class="text-slate-500 text-xs">Ожидает</span>';
      actionsHtml = `<button onclick="cherryPickOne('${mr.merge_commit_sha}', ${mr.iid})" id="cp-btn-${mr.iid}"
        class="bg-orange-600 hover:bg-orange-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer">
        Cherry-pick</button>`;
    }

    tr.innerHTML = `
      <td class="px-3 py-2 text-slate-500">${i + 1}</td>
      <td class="px-3 py-2">
        <a href="${mr.web_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${mr.iid}</a>
        <div class="text-xs text-slate-400 mt-0.5 max-w-md truncate">${escapeHtml(mr.title)}</div>
      </td>
      <td class="px-3 py-2 text-slate-300">${escapeHtml(mr.author)}</td>
      <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
      <td class="px-3 py-2">${statusHtml}</td>
      <td class="px-3 py-2 text-right">${actionsHtml}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderErrors(errors) {
  const el = document.getElementById('load-errors');
  if (!errors || errors.length === 0) {
    el.classList.add('hidden');
    return;
  }
  el.classList.remove('hidden');
  el.innerHTML = errors.map(e =>
    `<div class="bg-red-900/30 border border-red-800 rounded-lg px-3 py-2 text-red-300 text-sm mb-1">
      MR !${e.iid}: ${escapeHtml(e.error)}
    </div>`
  ).join('');
}

async function cherryPickOne(sha, iid) {
  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const btn = document.getElementById(`cp-btn-${iid}`);
  if (btn) {
    btn.textContent = '...';
    btn.disabled = true;
  }

  try {
    const resp = await fetch('/api/queue/cherry-pick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        merge_commit_sha: sha,
        target_branch: targetBranch,
        source_mr_iid: iid,
        source_mr_title: (loadedMRs.find(m => m.iid === iid) || {}).title || '',
      }),
    });
    const data = await resp.json();

    if (resp.ok) {
      cherryPickState[iid] = {
        branch: data.cherry_pick_branch,
        mr_url: data.mr_create_url,
      };
      renderMRs();
      updateStatsLine();
      window.open(data.mr_create_url, '_blank');
    } else {
      alert(`MR !${iid}: ${data.detail || 'Ошибка cherry-pick'}`);
      if (btn) {
        btn.textContent = 'Cherry-pick';
        btn.disabled = false;
      }
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    if (btn) {
      btn.textContent = 'Cherry-pick';
      btn.disabled = false;
    }
  }
}

async function saveSession() {
  const cpEntries = Object.keys(cherryPickState);
  if (cpEntries.length === 0) {
    alert('Нет выполненных cherry-pick для сохранения');
    return;
  }

  const targetBranch = document.getElementById('target-branch').value.trim();
  const items = cpEntries.map(iidStr => {
    const iid = parseInt(iidStr, 10);
    const mr = loadedMRs.find(m => m.iid === iid) || {};
    const cp = cherryPickState[iid];
    return {
      mr_iid: iid,
      mr_title: mr.title || '',
      mr_url: mr.web_url || '',
      author: mr.author || '',
      merged_at: mr.merged_at || '',
      merge_commit_sha: mr.merge_commit_sha || '',
      cherry_pick_branch: cp.branch || '',
      mr_create_url: cp.mr_url || '',
    };
  });

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Сохранение...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target_branch: targetBranch, items }),
    });
    const data = await resp.json();

    if (resp.ok) {
      btn.textContent = 'Сохранено!';
      btn.classList.replace('bg-green-600', 'bg-green-800');
      loadHistory();
      setTimeout(() => {
        btn.textContent = 'Сохранить в историю';
        btn.disabled = false;
        btn.classList.replace('bg-green-800', 'bg-green-600');
      }, 2000);
    } else {
      alert(data.detail || 'Ошибка сохранения');
      btn.textContent = 'Сохранить в историю';
      btn.disabled = false;
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    btn.textContent = 'Сохранить в историю';
    btn.disabled = false;
  }
}

function updateStatsLine() {
  const total = loadedMRs.length;
  const done = Object.keys(cherryPickState).length;
  const waiting = total - done;
  document.getElementById('stats-line').textContent =
    `Всего: ${total} | Cherry-picked: ${done} | Ожидают: ${waiting}`;
}

/* --- История --- */

async function loadHistory() {
  const el = document.getElementById('history-list');
  try {
    const resp = await fetch('/api/queue/history');
    const sessions = await resp.json();

    if (sessions.length === 0) {
      el.innerHTML = '<p class="text-slate-500 text-sm">Нет сохранённых сессий</p>';
      return;
    }

    el.innerHTML = sessions.map(s => {
      const date = new Date(s.created_at).toLocaleString('ru-RU');
      return `
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-3 mb-2 flex items-center justify-between">
          <div>
            <span class="text-white font-medium">${escapeHtml(s.target_branch)}</span>
            <span class="text-slate-400 text-xs ml-2">${s.mr_count} MR</span>
            <span class="text-slate-500 text-xs ml-2">${date}</span>
          </div>
          <div class="flex gap-2">
            <button onclick="viewSession(${s.id})"
              class="text-blue-400 hover:text-blue-300 text-xs cursor-pointer">Подробнее</button>
            <button onclick="deleteSession(${s.id})"
              class="text-red-400 hover:text-red-300 text-xs cursor-pointer">Удалить</button>
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<p class="text-red-400 text-sm">Ошибка загрузки истории</p>';
  }
}

async function viewSession(id) {
  try {
    const resp = await fetch(`/api/queue/history/${id}`);
    const data = await resp.json();
    const s = data.session;
    const items = data.items;

    document.getElementById('modal-title').textContent =
      `${s.target_branch} — ${s.mr_count} MR — ${new Date(s.created_at).toLocaleString('ru-RU')}`;

    document.getElementById('modal-body').innerHTML = `
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-slate-400 border-b border-slate-700">
            <th class="px-3 py-2 w-8">#</th>
            <th class="px-3 py-2">MR</th>
            <th class="px-3 py-2">Автор</th>
            <th class="px-3 py-2">Дата мержа</th>
            <th class="px-3 py-2">Cherry-pick ветка</th>
          </tr>
        </thead>
        <tbody>
          ${items.map((item, i) => {
            const merged = item.merged_at ? new Date(item.merged_at).toLocaleString('ru-RU') : '—';
            return `
              <tr class="border-b border-slate-700/50">
                <td class="px-3 py-2 text-slate-500">${i + 1}</td>
                <td class="px-3 py-2">
                  <a href="${item.mr_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${item.mr_iid}</a>
                  <div class="text-xs text-slate-400 mt-0.5 truncate max-w-xs">${escapeHtml(item.mr_title)}</div>
                </td>
                <td class="px-3 py-2 text-slate-300">${escapeHtml(item.author)}</td>
                <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
                <td class="px-3 py-2">
                  ${item.mr_create_url
                    ? `<a href="${item.mr_create_url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs">${escapeHtml(item.cherry_pick_branch)}</a>`
                    : `<span class="text-slate-500 text-xs">${escapeHtml(item.cherry_pick_branch)}</span>`
                  }
                </td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    document.getElementById('session-modal').classList.remove('hidden');
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('session-modal').classList.add('hidden');
}

async function deleteSession(id) {
  if (!confirm('Удалить запись из истории?')) return;
  try {
    const resp = await fetch(`/api/queue/history/${id}`, { method: 'DELETE' });
    if (resp.ok) loadHistory();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// Загружаем историю при открытии страницы
document.addEventListener('DOMContentLoaded', loadHistory);
</script>
{% endblock %}
