{% extends "base.html" %}
{% block title %}Очередность — GitLab → Teams{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Очередность Cherry-Pick</h1>

<!-- Ввод MR -->
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6">
  <label class="block text-sm font-medium text-slate-300 mb-2">Список MR (IID через запятую или по одному на строку)</label>
  <textarea id="mr-input" rows="4"
    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none font-mono"
    placeholder="123, 456, 789&#10;или&#10;123&#10;456&#10;789"></textarea>

  <div class="flex gap-3 items-end mt-3 flex-wrap">
    <div>
      <label class="block text-xs text-slate-400 mb-1">Релизная ветка (куда вливать)</label>
      <input type="text" id="target-branch" value=""
        class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-64"
        placeholder="release/99">
    </div>
    <button onclick="loadMRs()" id="load-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Загрузить
    </button>
  </div>
</div>

<!-- Ошибки загрузки -->
<div id="load-errors" class="mb-4 hidden"></div>

<!-- Панель управления -->
<div id="control-panel" class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6 hidden">
  <div class="flex items-center gap-4 flex-wrap">
    <button onclick="refreshStatuses()" id="refresh-btn"
      class="bg-slate-600 hover:bg-slate-500 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Обновить статусы
    </button>
    <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
      <input type="checkbox" id="auto-poll" onchange="toggleAutoPoll()" class="cursor-pointer">
      Автоопрос каждую минуту
    </label>
    <span id="poll-status" class="text-xs text-slate-500"></span>
    <span class="ml-auto text-xs text-slate-500" id="stats-line"></span>
  </div>
</div>

<!-- Таблица MR -->
<div id="mr-table" class="hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-700">
          <th class="px-3 py-2 w-8">#</th>
          <th class="px-3 py-2">Исходный MR</th>
          <th class="px-3 py-2">Автор</th>
          <th class="px-3 py-2">Дата мержа</th>
          <th class="px-3 py-2">Cherry-pick статус</th>
          <th class="px-3 py-2 text-right">Действия</th>
        </tr>
      </thead>
      <tbody id="mr-tbody"></tbody>
    </table>
  </div>
</div>

<script>
let loadedMRs = [];
let cherryPickState = {};  // iid -> { branch, mr_url, status }
let pollTimer = null;

async function loadMRs() {
  const input = document.getElementById('mr-input').value.trim();
  if (!input) return;

  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const iids = input
    .split(/[\s,]+/)
    .map(s => parseInt(s.replace(/[^0-9]/g, ''), 10))
    .filter(n => !isNaN(n) && n > 0);

  if (iids.length === 0) {
    alert('Не найдено валидных IID');
    return;
  }

  const btn = document.getElementById('load-btn');
  btn.textContent = 'Загрузка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mr_iids: iids }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      alert(data.detail || 'Ошибка загрузки');
      return;
    }

    loadedMRs = data.mrs;
    cherryPickState = {};
    renderMRs();
    renderErrors(data.errors);

    document.getElementById('control-panel').classList.remove('hidden');
    document.getElementById('mr-table').classList.remove('hidden');
    updateStatsLine();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.textContent = 'Загрузить';
    btn.disabled = false;
  }
}

function renderMRs() {
  const tbody = document.getElementById('mr-tbody');
  tbody.innerHTML = '';
  loadedMRs.forEach((mr, i) => {
    const merged = mr.merged_at ? new Date(mr.merged_at).toLocaleString('ru-RU') : '—';
    const hasCommit = !!mr.merge_commit_sha;
    const cp = cherryPickState[mr.iid];

    const tr = document.createElement('tr');
    tr.className = 'border-b border-slate-700/50 hover:bg-slate-800/50';
    tr.id = `mr-row-${mr.iid}`;

    tr.innerHTML = `
      <td class="px-3 py-2 text-slate-500">${i + 1}</td>
      <td class="px-3 py-2">
        <a href="${mr.web_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${mr.iid}</a>
        <div class="text-xs text-slate-400 mt-0.5 max-w-md truncate">${escapeHtml(mr.title)}</div>
      </td>
      <td class="px-3 py-2 text-slate-300">${escapeHtml(mr.author)}</td>
      <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
      <td class="px-3 py-2" id="cp-status-cell-${mr.iid}">
        ${renderStatusCell(mr.iid, cp)}
      </td>
      <td class="px-3 py-2 text-right" id="cp-actions-${mr.iid}">
        ${renderActionsCell(mr, hasCommit, cp)}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderStatusCell(iid, cp) {
  if (!cp) {
    return '<span class="text-slate-500 text-xs">Ожидает</span>';
  }
  if (cp.status === 'merged') {
    return `<span class="inline-flex items-center gap-1 bg-purple-900/40 text-purple-300 border border-purple-700 rounded-full px-2 py-0.5 text-xs font-medium">Merged</span>`;
  }
  if (cp.status === 'opened') {
    return `<a href="${cp.mr_url}" target="_blank" class="inline-flex items-center gap-1 bg-green-900/40 text-green-300 border border-green-700 rounded-full px-2 py-0.5 text-xs font-medium hover:bg-green-900/60">Opened</a>`;
  }
  if (cp.status === 'cherry-picked') {
    return `<span class="inline-flex items-center gap-1 bg-orange-900/40 text-orange-300 border border-orange-700 rounded-full px-2 py-0.5 text-xs font-medium">Cherry-picked, создайте MR</span>`;
  }
  if (cp.status === 'closed') {
    return `<span class="inline-flex items-center gap-1 bg-red-900/40 text-red-300 border border-red-700 rounded-full px-2 py-0.5 text-xs font-medium">Closed</span>`;
  }
  return `<span class="text-slate-400 text-xs">${escapeHtml(cp.status)}</span>`;
}

function renderActionsCell(mr, hasCommit, cp) {
  if (cp && cp.status === 'merged') {
    return '<span class="text-purple-400 text-xs">Готово</span>';
  }
  if (cp && cp.mr_url) {
    return `<a href="${cp.mr_url}" target="_blank"
      class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer inline-block">
      Открыть MR</a>`;
  }
  if (!hasCommit) {
    return '<span class="text-slate-500 text-xs">Нет merge commit</span>';
  }
  return `<button onclick="cherryPickOne('${mr.merge_commit_sha}', ${mr.iid})" id="cp-btn-${mr.iid}"
    class="bg-orange-600 hover:bg-orange-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer">
    Cherry-pick</button>`;
}

function renderErrors(errors) {
  const el = document.getElementById('load-errors');
  if (!errors || errors.length === 0) {
    el.classList.add('hidden');
    return;
  }
  el.classList.remove('hidden');
  el.innerHTML = errors.map(e =>
    `<div class="bg-red-900/30 border border-red-800 rounded-lg px-3 py-2 text-red-300 text-sm mb-1">
      MR !${e.iid}: ${escapeHtml(e.error)}
    </div>`
  ).join('');
}

async function cherryPickOne(sha, iid) {
  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const btn = document.getElementById(`cp-btn-${iid}`);
  if (btn) {
    btn.textContent = '...';
    btn.disabled = true;
  }

  try {
    const resp = await fetch('/api/queue/cherry-pick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        merge_commit_sha: sha,
        target_branch: targetBranch,
        source_mr_iid: iid,
        source_mr_title: (loadedMRs.find(m => m.iid === iid) || {}).title || '',
      }),
    });
    const data = await resp.json();

    if (resp.ok) {
      cherryPickState[iid] = {
        branch: data.cherry_pick_branch,
        mr_url: data.mr_create_url,
        status: 'cherry-picked',
      };
      renderMRs();
      window.open(data.mr_create_url, '_blank');
    } else {
      alert(`MR !${iid}: ${data.detail || 'Ошибка cherry-pick'}`);
      if (btn) {
        btn.textContent = 'Cherry-pick';
        btn.disabled = false;
      }
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    if (btn) {
      btn.textContent = 'Cherry-pick';
      btn.disabled = false;
    }
  }
}

async function refreshStatuses() {
  const branches = Object.values(cherryPickState)
    .filter(cp => cp.branch && cp.status !== 'merged')
    .map(cp => cp.branch);

  if (branches.length === 0) {
    updateStatsLine();
    return;
  }

  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Проверка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_branches: branches }),
    });
    const data = await resp.json();

    if (resp.ok) {
      for (const mr of data.mrs) {
        const iid = Object.keys(cherryPickState).find(
          k => cherryPickState[k].branch === mr.source_branch
        );
        if (iid) {
          cherryPickState[iid].status = mr.state;
          cherryPickState[iid].mr_url = mr.web_url;
        }
      }
      renderMRs();
      updateStatsLine();
    }
  } catch (e) {
    console.error('Ошибка обновления статусов:', e);
  } finally {
    btn.textContent = 'Обновить статусы';
    btn.disabled = false;
    document.getElementById('poll-status').textContent =
      'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');
  }
}

function toggleAutoPoll() {
  const checked = document.getElementById('auto-poll').checked;
  if (checked) {
    refreshStatuses();
    pollTimer = setInterval(refreshStatuses, 60000);
    document.getElementById('poll-status').textContent = 'Автоопрос включён';
  } else {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = null;
    document.getElementById('poll-status').textContent = 'Автоопрос выключен';
  }
}

function updateStatsLine() {
  const total = loadedMRs.length;
  const cpDone = Object.values(cherryPickState).filter(
    cp => cp.status === 'merged'
  ).length;
  const cpPending = Object.values(cherryPickState).filter(
    cp => cp.status === 'opened' || cp.status === 'cherry-picked'
  ).length;
  const waiting = total - Object.keys(cherryPickState).length;

  document.getElementById('stats-line').textContent =
    `Всего: ${total} | Merged: ${cpDone} | В процессе: ${cpPending} | Ожидают: ${waiting}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
</script>
{% endblock %}
