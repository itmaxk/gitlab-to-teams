{% extends "base.html" %}
{% block title %}Очередность — GitLab → Teams{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Очередность Cherry-Pick</h1>

<!-- Ввод MR -->
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6">
  <label class="block text-sm font-medium text-slate-300 mb-2">Список MR (IID через запятую или по одному на строку)</label>
  <textarea id="mr-input" rows="4"
    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none font-mono"
    placeholder="123, 456, 789&#10;или&#10;123&#10;456&#10;789"></textarea>
  <button onclick="loadMRs()" id="load-btn"
    class="mt-3 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
    Загрузить
  </button>
</div>

<!-- Настройка ветки -->
<div id="branch-section" class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6 hidden">
  <h2 class="text-lg font-semibold mb-3">Целевая ветка для Cherry-Pick</h2>
  <div class="flex gap-3 items-end flex-wrap">
    <div>
      <label class="block text-xs text-slate-400 mb-1">Новая ветка от</label>
      <input type="text" id="branch-ref" value="master"
        class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-48"
        placeholder="master">
    </div>
    <div>
      <label class="block text-xs text-slate-400 mb-1">Имя новой ветки</label>
      <input type="text" id="branch-name"
        class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-64"
        placeholder="cherry-pick/release-2026-03-28">
    </div>
    <button onclick="createBranch()" id="create-branch-btn"
      class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Создать ветку
    </button>
  </div>
  <div class="mt-3 flex gap-3 items-center">
    <label class="block text-xs text-slate-400">Или укажите существующую ветку:</label>
    <input type="text" id="target-branch"
      class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-64"
      placeholder="имя существующей ветки">
  </div>
  <div class="mt-3">
    <button onclick="applyBranchToAll()" class="text-blue-400 hover:text-blue-300 text-sm cursor-pointer">
      Применить ветку ко всем MR ↓
    </button>
    <button onclick="cherryPickAll()" id="cherry-pick-all-btn"
      class="ml-4 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Cherry-pick все по порядку
    </button>
  </div>
</div>

<!-- Ошибки загрузки -->
<div id="load-errors" class="mb-4 hidden"></div>

<!-- Таблица MR -->
<div id="mr-table" class="hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-700">
          <th class="px-3 py-2 w-8">#</th>
          <th class="px-3 py-2">MR</th>
          <th class="px-3 py-2">Автор</th>
          <th class="px-3 py-2">Дата мержа</th>
          <th class="px-3 py-2">Ветка</th>
          <th class="px-3 py-2 text-right">Действия</th>
        </tr>
      </thead>
      <tbody id="mr-tbody"></tbody>
    </table>
  </div>
</div>

<script>
let loadedMRs = [];

async function loadMRs() {
  const input = document.getElementById('mr-input').value.trim();
  if (!input) return;

  const iids = input
    .split(/[\s,]+/)
    .map(s => parseInt(s.replace(/[^0-9]/g, ''), 10))
    .filter(n => !isNaN(n) && n > 0);

  if (iids.length === 0) {
    alert('Не найдено валидных IID');
    return;
  }

  const btn = document.getElementById('load-btn');
  btn.textContent = 'Загрузка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mr_iids: iids }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      alert(data.detail || 'Ошибка загрузки');
      return;
    }

    loadedMRs = data.mrs;
    renderMRs();
    renderErrors(data.errors);

    document.getElementById('branch-section').classList.remove('hidden');
    document.getElementById('mr-table').classList.remove('hidden');
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.textContent = 'Загрузить';
    btn.disabled = false;
  }
}

function renderMRs() {
  const tbody = document.getElementById('mr-tbody');
  tbody.innerHTML = '';
  loadedMRs.forEach((mr, i) => {
    const merged = mr.merged_at ? new Date(mr.merged_at).toLocaleString('ru-RU') : '—';
    const stateColor = mr.state === 'merged'
      ? 'text-purple-400'
      : mr.state === 'opened' ? 'text-green-400' : 'text-slate-400';
    const hasCommit = !!mr.merge_commit_sha;

    const tr = document.createElement('tr');
    tr.className = 'border-b border-slate-700/50 hover:bg-slate-800/50';
    tr.id = `mr-row-${mr.iid}`;
    tr.innerHTML = `
      <td class="px-3 py-2 text-slate-500">${i + 1}</td>
      <td class="px-3 py-2">
        <a href="${mr.web_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${mr.iid}</a>
        <span class="${stateColor} text-xs ml-1">${mr.state}</span>
        <div class="text-xs text-slate-400 mt-0.5 max-w-md truncate">${escapeHtml(mr.title)}</div>
      </td>
      <td class="px-3 py-2 text-slate-300">${escapeHtml(mr.author)}</td>
      <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
      <td class="px-3 py-2">
        <input type="text" value="" placeholder="ветка"
          class="branch-input bg-slate-900 border border-slate-600 rounded px-2 py-1 text-white text-xs focus:border-blue-500 focus:outline-none w-40"
          data-iid="${mr.iid}">
      </td>
      <td class="px-3 py-2 text-right">
        ${hasCommit
          ? `<button onclick="cherryPickOne('${mr.merge_commit_sha}', ${mr.iid})" id="cp-btn-${mr.iid}"
               class="bg-orange-600 hover:bg-orange-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer">
               Cherry-pick
             </button>`
          : `<span class="text-slate-500 text-xs">Нет merge commit</span>`
        }
        <span id="cp-status-${mr.iid}" class="ml-2 text-xs"></span>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderErrors(errors) {
  const el = document.getElementById('load-errors');
  if (!errors || errors.length === 0) {
    el.classList.add('hidden');
    return;
  }
  el.classList.remove('hidden');
  el.innerHTML = errors.map(e =>
    `<div class="bg-red-900/30 border border-red-800 rounded-lg px-3 py-2 text-red-300 text-sm mb-1">
      MR !${e.iid}: ${escapeHtml(e.error)}
    </div>`
  ).join('');
}

function getTargetBranch(iid) {
  if (iid) {
    const input = document.querySelector(`.branch-input[data-iid="${iid}"]`);
    if (input && input.value.trim()) return input.value.trim();
  }
  const global = document.getElementById('target-branch').value.trim();
  if (global) return global;
  return null;
}

function applyBranchToAll() {
  const branch = document.getElementById('target-branch').value.trim();
  if (!branch) {
    alert('Укажите ветку в поле выше');
    return;
  }
  document.querySelectorAll('.branch-input').forEach(input => {
    input.value = branch;
  });
}

async function createBranch() {
  const name = document.getElementById('branch-name').value.trim();
  const ref = document.getElementById('branch-ref').value.trim() || 'master';
  if (!name) {
    alert('Укажите имя новой ветки');
    return;
  }

  const btn = document.getElementById('create-branch-btn');
  btn.textContent = 'Создание...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/branch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ branch_name: name, ref: ref }),
    });
    const data = await resp.json();

    if (resp.ok) {
      btn.textContent = 'Создана!';
      btn.classList.replace('bg-green-600', 'bg-green-800');
      document.getElementById('target-branch').value = name;
      applyBranchToAll();
      setTimeout(() => {
        btn.textContent = 'Создать ветку';
        btn.disabled = false;
        btn.classList.replace('bg-green-800', 'bg-green-600');
      }, 2000);
    } else {
      alert(data.detail || 'Ошибка создания ветки');
      btn.textContent = 'Создать ветку';
      btn.disabled = false;
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    btn.textContent = 'Создать ветку';
    btn.disabled = false;
  }
}

async function cherryPickOne(sha, iid) {
  const branch = getTargetBranch(iid);
  if (!branch) {
    alert('Укажите целевую ветку для MR !' + iid);
    return;
  }

  const btn = document.getElementById(`cp-btn-${iid}`);
  const status = document.getElementById(`cp-status-${iid}`);
  btn.textContent = '...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/cherry-pick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ merge_commit_sha: sha, target_branch: branch }),
    });
    const data = await resp.json();

    if (resp.ok) {
      btn.textContent = 'Готово';
      btn.classList.replace('bg-orange-600', 'bg-green-700');
      status.textContent = '';
      status.className = 'ml-2 text-xs text-green-400';
    } else {
      btn.textContent = 'Ошибка';
      btn.classList.replace('bg-orange-600', 'bg-red-700');
      status.textContent = data.detail || 'Ошибка';
      status.className = 'ml-2 text-xs text-red-400';
      setTimeout(() => {
        btn.textContent = 'Cherry-pick';
        btn.disabled = false;
        btn.classList.replace('bg-red-700', 'bg-orange-600');
      }, 3000);
    }
  } catch (e) {
    btn.textContent = 'Ошибка';
    status.textContent = e.message;
    status.className = 'ml-2 text-xs text-red-400';
    setTimeout(() => {
      btn.textContent = 'Cherry-pick';
      btn.disabled = false;
    }, 3000);
  }
}

async function cherryPickAll() {
  const branch = document.getElementById('target-branch').value.trim();
  if (!branch) {
    alert('Укажите целевую ветку');
    return;
  }

  const shas = loadedMRs
    .filter(mr => mr.merge_commit_sha)
    .map(mr => ({ sha: mr.merge_commit_sha, iid: mr.iid }));

  if (shas.length === 0) {
    alert('Нет MR с merge commit');
    return;
  }

  const btn = document.getElementById('cherry-pick-all-btn');
  btn.textContent = 'Выполнение...';
  btn.disabled = true;

  for (const { sha, iid } of shas) {
    const cpBtn = document.getElementById(`cp-btn-${iid}`);
    const status = document.getElementById(`cp-status-${iid}`);
    if (!cpBtn || cpBtn.textContent === 'Готово') continue;

    const inputBranch = getTargetBranch(iid) || branch;

    cpBtn.textContent = '...';
    cpBtn.disabled = true;

    try {
      const resp = await fetch('/api/queue/cherry-pick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ merge_commit_sha: sha, target_branch: inputBranch }),
      });
      const data = await resp.json();

      if (resp.ok) {
        cpBtn.textContent = 'Готово';
        cpBtn.classList.replace('bg-orange-600', 'bg-green-700');
        status.textContent = '';
        status.className = 'ml-2 text-xs text-green-400';
      } else {
        cpBtn.textContent = 'Ошибка';
        cpBtn.classList.replace('bg-orange-600', 'bg-red-700');
        status.textContent = data.detail || 'Ошибка';
        status.className = 'ml-2 text-xs text-red-400';
      }
    } catch (e) {
      cpBtn.textContent = 'Ошибка';
      status.textContent = e.message;
      status.className = 'ml-2 text-xs text-red-400';
    }
  }

  btn.textContent = 'Cherry-pick все по порядку';
  btn.disabled = false;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
</script>
{% endblock %}
