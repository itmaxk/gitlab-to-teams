{% extends "base.html" %}
{% block title %}Cherry-Pick — GitLab → Teams{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Cherry-Pick</h1>

<!-- Поиск по Jira -->
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-4">
  <label class="block text-sm font-medium text-slate-300 mb-2">Поиск MR по Jira (ID через запятую или по одному на строку)</label>
  <textarea id="jira-input" rows="3"
    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none font-mono"
    placeholder="PROJ-6416, 6417&#10;https://jira.domain.com/browse/PROJ-6416&#10;или номера: 6416, 6417"></textarea>
  <div class="flex gap-3 items-center mt-3 flex-wrap">
    <button onclick="searchJira()" id="jira-search-btn"
      class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Найти MR
    </button>
    <button onclick="copyJiraLinks()" id="jira-copy-btn"
      class="bg-slate-600 hover:bg-slate-500 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer hidden">
      Копировать ссылки MR
    </button>
    <button onclick="copyJiraTaskLinks()" id="jira-copy-task-btn"
      class="bg-slate-600 hover:bg-slate-500 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer hidden">
      Копировать ссылки Jira
    </button>
    <button onclick="fillMrIds()" id="jira-fill-btn"
      class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer hidden">
      Подставить в список MR
    </button>
    <span id="jira-stats" class="text-xs text-slate-500"></span>
  </div>
  <div id="jira-results" class="mt-3 hidden"></div>
</div>

<!-- Ввод MR -->
<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6">
  <label class="block text-sm font-medium text-slate-300 mb-2">Список MR (ID через запятую или по одному на строку)</label>
  <textarea id="mr-input" rows="4"
    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none font-mono"
    placeholder="123, 456, 789&#10;https://gitlab.domain.com/project/-/merge_requests/123&#10;или по одному на строку"></textarea>

  <div class="flex gap-3 items-end mt-3 flex-wrap">
    <div>
      <label class="block text-xs text-slate-400 mb-1">Релизная ветка (куда вливать)</label>
      <input type="text" id="target-branch" value=""
        class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm focus:border-blue-500 focus:outline-none w-64"
        placeholder="release/99">
    </div>
    <button onclick="loadMRs()" id="load-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Загрузить
    </button>
  </div>
</div>

<!-- Ошибки загрузки -->
<div id="load-errors" class="mb-4 hidden"></div>

<!-- Панель управления -->
<div id="control-panel" class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6 hidden">
  <div class="flex items-center gap-4 flex-wrap">
    <button onclick="autoCherryPickAll()" id="auto-cp-btn"
      class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Auto Cherry-Pick
    </button>
    <button onclick="refreshStatuses()" id="refresh-btn"
      class="bg-slate-600 hover:bg-slate-500 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Обновить статусы
    </button>
    <button onclick="showAllCpLinks()" id="links-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Список ссылок
    </button>
    <button onclick="saveSession()" id="save-btn"
      class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer">
      Сохранить в историю
    </button>
    <span class="ml-auto text-xs text-slate-500" id="stats-line"></span>
  </div>
</div>

<!-- Таблица MR -->
<div id="mr-table" class="hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-700">
          <th class="px-3 py-2 w-8">#</th>
          <th class="px-3 py-2">Исходный MR</th>
          <th class="px-3 py-2">Автор</th>
          <th class="px-3 py-2">Дата мержа</th>
          <th class="px-3 py-2">Cherry-pick MR</th>
          <th class="px-3 py-2">CP дата мержа</th>
          <th class="px-3 py-2">Статус</th>
          <th class="px-3 py-2 text-right">Действия</th>
        </tr>
      </thead>
      <tbody id="mr-tbody"></tbody>
    </table>
  </div>
</div>

<!-- История -->
<div class="mt-10">
  <h2 class="text-xl font-bold mb-4">История Cherry-Pick</h2>
  <div id="history-list">
    <p class="text-slate-500 text-sm">Загрузка...</p>
  </div>
</div>

<!-- Модальное окно деталей сессии -->
<div id="session-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center">
  <div class="bg-slate-800 border border-slate-700 rounded-lg max-w-3xl w-full mx-4 max-h-[80vh] overflow-y-auto">
    <div class="flex items-center justify-between p-4 border-b border-slate-700">
      <h3 class="text-lg font-semibold" id="modal-title"></h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl cursor-pointer">&times;</button>
    </div>
    <div class="p-4" id="modal-body"></div>
  </div>
</div>

<script>
const JIRA_URL = '{{ jira_url }}'.replace(/\/+$/, '');
const JIRA_PROJECT = '{{ jira_project }}';

let loadedMRs = [];
// id -> { branch, mr_url, status: 'opened' | 'merged' }
let cherryPickState = {};
let pollTimer = null;
let autoRunning = false;
let jiraResults = [];

function parseJiraInput(raw) {
  return raw.split(/[\s,]+/).map(s => s.trim()).filter(Boolean).map(s => {
    // Full URL: https://jira.domain.com/browse/PROJECT-123
    const urlMatch = s.match(/\/browse\/([A-Za-z][\w-]*-\d+)/);
    if (urlMatch) return urlMatch[1];
    // Full Jira key: PROJECT-123
    if (/^[A-Za-z][\w-]*-\d+$/.test(s)) return s;
    // Bare number: 123 → JIRA_PROJECT-123
    if (/^\d+$/.test(s) && JIRA_PROJECT) return `${JIRA_PROJECT}-${s}`;
    return s;
  });
}

function parseMrInput(raw) {
  return raw.split(/[\s,]+/).map(s => s.trim()).filter(Boolean).map(s => {
    // Full URL: .../merge_requests/123
    const urlMatch = s.match(/\/merge_requests\/(\d+)/);
    if (urlMatch) return parseInt(urlMatch[1], 10);
    // Plain number
    const n = parseInt(s.replace(/[^0-9]/g, ''), 10);
    return isNaN(n) || n <= 0 ? null : n;
  }).filter(n => n !== null);
}

async function searchJira() {
  const input = document.getElementById('jira-input').value.trim();
  if (!input) return;

  const ids = parseJiraInput(input);
  if (ids.length === 0) {
    alert('Не найдено валидных Jira ID');
    return;
  }

  const btn = document.getElementById('jira-search-btn');
  btn.textContent = 'Поиск...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/search-jira', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jira_ids: ids }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      alert(data.detail || 'Ошибка поиска');
      return;
    }

    jiraResults = data.results.filter(r => r.mr_id);
    const errors = data.results.filter(r => r.state === 'error');

    renderJiraResults(jiraResults, errors);

    document.getElementById('jira-copy-btn').classList.toggle('hidden', jiraResults.length === 0);
    document.getElementById('jira-copy-task-btn').classList.toggle('hidden', jiraResults.length === 0 || !JIRA_URL);
    document.getElementById('jira-fill-btn').classList.toggle('hidden', jiraResults.length === 0);
    document.getElementById('jira-stats').textContent =
      `Найдено: ${jiraResults.length} MR` + (errors.length ? ` | Ошибок: ${errors.length}` : '');
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.textContent = 'Найти MR';
    btn.disabled = false;
  }
}

function renderJiraResults(results, errors) {
  const el = document.getElementById('jira-results');
  if (results.length === 0 && errors.length === 0) {
    el.innerHTML = '<p class="text-slate-500 text-sm">Ничего не найдено</p>';
    el.classList.remove('hidden');
    return;
  }

  let html = '<div class="space-y-1 max-h-60 overflow-y-auto">';
  for (const r of results) {
    const jiraLink = JIRA_URL
      ? `<a href="${JIRA_URL}/browse/${encodeURIComponent(r.jira_id)}" target="_blank" class="text-indigo-400 hover:text-indigo-300 font-medium shrink-0">${escapeHtml(r.jira_id)}</a>`
      : `<span class="text-indigo-400 font-medium shrink-0">${escapeHtml(r.jira_id)}</span>`;
    const branchBadge = r.target_branch
      ? `<span class="text-xs text-teal-400 bg-teal-900/30 border border-teal-800 rounded px-1.5 py-0.5 shrink-0">${escapeHtml(r.target_branch)}</span>`
      : '';
    html += `<div class="flex items-center gap-2 py-1 px-2 rounded bg-slate-900/50 text-sm">
      ${jiraLink}
      <a href="${r.web_url}" target="_blank" class="text-blue-400 hover:text-blue-300 shrink-0">!${r.mr_id}</a>
      <span class="text-slate-400 text-xs truncate">${escapeHtml(r.title)}</span>
      ${branchBadge}
      <span class="ml-auto text-xs ${r.state === 'merged' ? 'text-purple-400' : 'text-yellow-400'}">${r.state}</span>
    </div>`;
  }
  for (const e of errors) {
    html += `<div class="flex items-center gap-2 py-1 px-2 rounded bg-red-900/20 text-sm">
      <span class="text-indigo-400 font-medium shrink-0">${escapeHtml(e.jira_id)}</span>
      <span class="text-red-400 text-xs">${escapeHtml(e.error || 'Ошибка')}</span>
    </div>`;
  }
  html += '</div>';

  el.innerHTML = html;
  el.classList.remove('hidden');
}

function copyJiraLinks() {
  if (jiraResults.length === 0) return;
  const links = jiraResults.map(r => r.web_url).join('\n');
  navigator.clipboard.writeText(links);
  const btn = document.getElementById('jira-copy-btn');
  btn.textContent = 'Скопировано!';
  setTimeout(() => { btn.textContent = 'Копировать ссылки MR'; }, 1500);
}

function copyJiraTaskLinks() {
  if (jiraResults.length === 0 || !JIRA_URL) return;
  const seen = new Set();
  const links = jiraResults
    .filter(r => { if (seen.has(r.jira_id)) return false; seen.add(r.jira_id); return true; })
    .map(r => `${JIRA_URL}/browse/${r.jira_id}`)
    .join('\n');
  navigator.clipboard.writeText(links);
  const btn = document.getElementById('jira-copy-task-btn');
  btn.textContent = 'Скопировано!';
  setTimeout(() => { btn.textContent = 'Копировать ссылки Jira'; }, 1500);
}

function fillMrIds() {
  if (jiraResults.length === 0) return;
  const ids = jiraResults.map(r => r.mr_id);
  const existing = document.getElementById('mr-input').value.trim();
  const existingIds = existing
    ? existing.split(/[\s,]+/).map(s => parseInt(s.replace(/[^0-9]/g, ''), 10)).filter(n => !isNaN(n) && n > 0)
    : [];
  const merged = [...new Set([...existingIds, ...ids])];
  document.getElementById('mr-input').value = merged.join('\n');
}

async function loadMRs() {
  const input = document.getElementById('mr-input').value.trim();
  if (!input) return;

  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const ids = parseMrInput(input);

  if (ids.length === 0) {
    alert('Не найдено валидных ID');
    return;
  }

  const btn = document.getElementById('load-btn');
  btn.textContent = 'Загрузка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mr_ids: ids }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      alert(data.detail || 'Ошибка загрузки');
      return;
    }

    loadedMRs = data.mrs;
    cherryPickState = {};
    renderMRs();
    renderErrors(data.errors);

    document.getElementById('control-panel').classList.remove('hidden');
    document.getElementById('mr-table').classList.remove('hidden');
    updateStatsLine();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.textContent = 'Загрузить';
    btn.disabled = false;
  }
}

function renderMRs() {
  const tbody = document.getElementById('mr-tbody');
  tbody.innerHTML = '';
  loadedMRs.forEach((mr, i) => {
    const merged = mr.merged_at ? new Date(mr.merged_at).toLocaleString('ru-RU') : '—';
    const hasCommit = !!mr.merge_commit_sha;
    const cp = cherryPickState[mr.id];

    const tr = document.createElement('tr');
    tr.className = 'border-b border-slate-700/50 hover:bg-slate-800/50';
    tr.id = `mr-row-${mr.id}`;

    let statusHtml, actionsHtml;

    let cpMrHtml;
    if (cp && cp.mr_url) {
      const label = cp.mr_id ? `!${cp.mr_id}` : 'Открыть';
      cpMrHtml = `<a href="${cp.mr_url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs">${label}</a>`;
    } else {
      cpMrHtml = '<span class="text-slate-500 text-xs">—</span>';
    }

    if (cp && cp.status === 'merged') {
      statusHtml = '<span class="inline-flex items-center bg-purple-900/40 text-purple-300 border border-purple-700 rounded-full px-2 py-0.5 text-xs font-medium">Cherry-picked</span>';
      actionsHtml = '<span class="text-purple-400 text-xs">Готово</span>';
    } else if (cp && cp.status === 'opened') {
      statusHtml = '<span class="inline-flex items-center bg-yellow-900/40 text-yellow-300 border border-yellow-700 rounded-full px-2 py-0.5 text-xs font-medium">MR создан</span>';
      actionsHtml = `<a href="${cp.mr_url}" target="_blank"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer inline-block">
        Открыть MR</a>`;
    } else if (!hasCommit) {
      statusHtml = '<span class="text-slate-500 text-xs">Нет merge commit</span>';
      actionsHtml = '';
    } else {
      statusHtml = '<span class="text-slate-500 text-xs">Ожидает</span>';
      actionsHtml = `<button onclick="cherryPickOne('${mr.merge_commit_sha}', ${mr.id})" id="cp-btn-${mr.id}"
        class="bg-orange-600 hover:bg-orange-700 text-white text-xs font-medium px-3 py-1 rounded cursor-pointer">
        Cherry-pick</button>`;
    }

    tr.innerHTML = `
      <td class="px-3 py-2 text-slate-500">${i + 1}</td>
      <td class="px-3 py-2">
        <a href="${mr.web_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${mr.id}</a>
        <div class="text-xs text-slate-400 mt-0.5 max-w-md truncate">${escapeHtml(mr.title)}</div>
      </td>
      <td class="px-3 py-2 text-slate-300">${escapeHtml(mr.author)}</td>
      <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
      <td class="px-3 py-2">${cpMrHtml}</td>
      <td class="px-3 py-2 text-slate-300 whitespace-nowrap text-xs">${cp && cp.merged_at ? new Date(cp.merged_at).toLocaleString('ru-RU') : '—'}</td>
      <td class="px-3 py-2">${statusHtml}</td>
      <td class="px-3 py-2 text-right">${actionsHtml}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderErrors(errors) {
  const el = document.getElementById('load-errors');
  if (!errors || errors.length === 0) {
    el.classList.add('hidden');
    return;
  }
  el.classList.remove('hidden');
  el.innerHTML = errors.map(e =>
    `<div class="bg-red-900/30 border border-red-800 rounded-lg px-3 py-2 text-red-300 text-sm mb-1">
      MR !${e.id}: ${escapeHtml(e.error)}
    </div>`
  ).join('');
}

async function cherryPickOne(sha, id) {
  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const btn = document.getElementById(`cp-btn-${id}`);
  if (btn) {
    btn.textContent = '...';
    btn.disabled = true;
  }

  try {
    const resp = await fetch('/api/queue/cherry-pick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        merge_commit_sha: sha,
        target_branch: targetBranch,
        source_mr_id: id,
        source_mr_title: (loadedMRs.find(m => m.id === id) || {}).title || '',
      }),
    });
    const data = await resp.json();

    if (resp.ok) {
      cherryPickState[id] = {
        branch: data.cherry_pick_branch,
        mr_url: data.mr_create_url,
        status: 'opened',
      };
      renderMRs();
      updateStatsLine();
      startAutoPoll();
      window.open(data.mr_create_url, '_blank');
    } else {
      alert(`MR !${id}: ${data.detail || 'Ошибка cherry-pick'}`);
      if (btn) {
        btn.textContent = 'Cherry-pick';
        btn.disabled = false;
      }
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    if (btn) {
      btn.textContent = 'Cherry-pick';
      btn.disabled = false;
    }
  }
}

async function autoCherryPickAll() {
  const targetBranch = document.getElementById('target-branch').value.trim();
  if (!targetBranch) {
    alert('Укажите релизную ветку');
    return;
  }

  const pending = loadedMRs.filter(mr => mr.merge_commit_sha && !cherryPickState[mr.id]);
  if (pending.length === 0) {
    alert('Нет MR для cherry-pick');
    return;
  }

  autoRunning = true;
  const btn = document.getElementById('auto-cp-btn');
  btn.disabled = true;

  for (const mr of pending) {
    if (!autoRunning) break;

    btn.textContent = `Cherry-pick !${mr.id}...`;

    try {
      const resp = await fetch('/api/queue/auto-cherry-pick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          merge_commit_sha: mr.merge_commit_sha,
          target_branch: targetBranch,
          source_mr_id: mr.id,
          source_mr_title: mr.title || '',
        }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        alert(`MR !${mr.id}: ${data.detail || 'Ошибка'}`);
        break;
      }

      cherryPickState[mr.id] = {
        branch: data.cherry_pick_branch,
        mr_url: data.mr_url,
        mr_id: data.mr_id,
        merged_at: data.merged_at || '',
        status: 'merged',
      };
      renderMRs();
      updateStatsLine();
    } catch (e) {
      alert(`MR !${mr.id}: ${e.message}`);
      break;
    }
  }

  autoRunning = false;
  btn.textContent = 'Auto Cherry-Pick';
  btn.disabled = false;

  // Автосохранение если есть замерженные
  const mergedCount = Object.values(cherryPickState).filter(cp => cp.status === 'merged').length;
  if (mergedCount > 0) {
    await saveSession(true);
  }
}

async function refreshStatuses() {
  const branches = Object.values(cherryPickState)
    .filter(cp => cp.branch && cp.status !== 'merged')
    .map(cp => cp.branch);

  if (branches.length === 0) {
    updateStatsLine();
    return;
  }

  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Проверка...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_branches: branches }),
    });
    const data = await resp.json();

    if (resp.ok) {
      for (const mr of data.mrs) {
        const key = Object.keys(cherryPickState).find(
          k => cherryPickState[k].branch === mr.source_branch
        );
        if (key) {
          cherryPickState[key].status = mr.state;
          if (mr.web_url) cherryPickState[key].mr_url = mr.web_url;
        }
      }
      renderMRs();
      updateStatsLine();
      if (!hasUnmerged()) stopAutoPoll();
    }
  } catch (e) {
    console.error('Ошибка обновления статусов:', e);
  } finally {
    btn.textContent = 'Обновить статусы';
    btn.disabled = false;
  }
}

function showAllCpLinks() {
  const links = loadedMRs
    .filter(mr => cherryPickState[mr.id] && cherryPickState[mr.id].mr_url)
    .map(mr => {
      const cp = cherryPickState[mr.id];
      const label = cp.mr_id ? `!${cp.mr_id}` : `!${mr.id} (cp)`;
      return { label, url: cp.mr_url, title: mr.title };
    });

  if (links.length === 0) {
    alert('Нет cherry-pick MR');
    return;
  }

  const body = links.map(l =>
    `<div class="flex items-center gap-2 py-1.5 border-b border-slate-700/50">
      <a href="${l.url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm font-medium shrink-0">${l.label}</a>
      <span class="text-slate-400 text-xs truncate">${escapeHtml(l.title)}</span>
      <button onclick="navigator.clipboard.writeText('${l.url}')" class="text-slate-500 hover:text-slate-300 text-xs shrink-0 cursor-pointer ml-auto">copy</button>
    </div>`
  ).join('');

  const allUrls = links.map(l => l.url).join('\n');

  document.getElementById('modal-title').textContent = `Cherry-pick MR — ${links.length} ссылок`;
  document.getElementById('modal-body').innerHTML = `
    <div class="mb-3">
      <button onclick="navigator.clipboard.writeText(\`${allUrls.replace(/`/g, '\\`')}\`)"
        class="bg-slate-600 hover:bg-slate-500 text-white text-xs font-medium px-3 py-1.5 rounded cursor-pointer">
        Копировать все ссылки
      </button>
    </div>
    ${body}`;
  document.getElementById('session-modal').classList.remove('hidden');
}

function generateSessionName() {
  const iids = Object.keys(cherryPickState).slice(0, 5).map(k => `!${k}`);
  const suffix = Object.keys(cherryPickState).length > 5 ? '...' : '';
  const time = new Date().toLocaleString('ru-RU');
  return `${iids.join(', ')}${suffix} — ${time}`;
}

async function saveSession(auto = false) {
  const cpEntries = Object.keys(cherryPickState);
  if (cpEntries.length === 0) {
    if (!auto) alert('Нет выполненных cherry-pick для сохранения');
    return;
  }

  const targetBranch = document.getElementById('target-branch').value.trim();
  const items = cpEntries.map(idStr => {
    const mrId = parseInt(idStr, 10);
    const mr = loadedMRs.find(m => m.id === mrId) || {};
    const cp = cherryPickState[mrId];
    return {
      mr_id: mrId,
      mr_title: mr.title || '',
      mr_url: mr.web_url || '',
      author: mr.author || '',
      merged_at: mr.merged_at || '',
      merge_commit_sha: mr.merge_commit_sha || '',
      cherry_pick_branch: cp.branch || '',
      mr_create_url: cp.mr_url || '',
      cherry_pick_mr_url: cp.mr_id ? cp.mr_url : '',
      cherry_pick_merged_at: cp.merged_at || '',
    };
  });

  const sessionName = generateSessionName();

  const btn = document.getElementById('save-btn');
  btn.textContent = 'Сохранение...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/queue/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: sessionName, target_branch: targetBranch, items }),
    });
    const data = await resp.json();

    if (resp.ok) {
      btn.textContent = 'Сохранено!';
      btn.classList.replace('bg-green-600', 'bg-green-800');
      loadHistory();
      setTimeout(() => {
        btn.textContent = 'Сохранить в историю';
        btn.disabled = false;
        btn.classList.replace('bg-green-800', 'bg-green-600');
      }, 2000);
    } else {
      alert(data.detail || 'Ошибка сохранения');
      btn.textContent = 'Сохранить в историю';
      btn.disabled = false;
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
    btn.textContent = 'Сохранить в историю';
    btn.disabled = false;
  }
}

function hasUnmerged() {
  return Object.values(cherryPickState).some(cp => cp.status !== 'merged');
}

function startAutoPoll() {
  if (pollTimer) return;
  pollTimer = setInterval(() => {
    if (hasUnmerged()) {
      refreshStatuses();
    } else {
      stopAutoPoll();
    }
  }, 60000);
}

function stopAutoPoll() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
}

function updateStatsLine() {
  const total = loadedMRs.length;
  const merged = Object.values(cherryPickState).filter(cp => cp.status === 'merged').length;
  const opened = Object.values(cherryPickState).filter(cp => cp.status === 'opened').length;
  const waiting = total - Object.keys(cherryPickState).length;
  document.getElementById('stats-line').textContent =
    `Всего: ${total} | Cherry-picked: ${merged} | MR создан: ${opened} | Ожидают: ${waiting}`;
}

/* --- История --- */

async function loadHistory() {
  const el = document.getElementById('history-list');
  try {
    const resp = await fetch('/api/queue/history');
    const sessions = await resp.json();

    if (sessions.length === 0) {
      el.innerHTML = '<p class="text-slate-500 text-sm">Нет сохранённых сессий</p>';
      return;
    }

    el.innerHTML = sessions.map(s => {
      const date = new Date(s.created_at).toLocaleString('ru-RU');
      return `
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-3 mb-2 flex items-center justify-between">
          <div>
            <span class="text-white font-medium">${escapeHtml(s.name || s.target_branch)}</span>
            <span class="text-slate-400 text-xs ml-2">${escapeHtml(s.target_branch)}</span>
            <span class="text-slate-400 text-xs ml-1">${s.mr_count} MR</span>
          </div>
          <div class="flex gap-2">
            <button onclick="viewSession(${s.id})"
              class="text-blue-400 hover:text-blue-300 text-xs cursor-pointer">Подробнее</button>
            <button onclick="deleteSession(${s.id})"
              class="text-red-400 hover:text-red-300 text-xs cursor-pointer">Удалить</button>
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<p class="text-red-400 text-sm">Ошибка загрузки истории</p>';
  }
}

async function viewSession(id) {
  try {
    const resp = await fetch(`/api/queue/history/${id}`);
    const data = await resp.json();
    const s = data.session;
    const items = data.items;

    document.getElementById('modal-title').textContent =
      `${s.target_branch} — ${s.mr_count} MR — ${new Date(s.created_at).toLocaleString('ru-RU')}`;

    document.getElementById('modal-body').innerHTML = `
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-slate-400 border-b border-slate-700">
            <th class="px-3 py-2 w-8">#</th>
            <th class="px-3 py-2">Исходный MR</th>
            <th class="px-3 py-2">Автор</th>
            <th class="px-3 py-2">Дата мержа</th>
            <th class="px-3 py-2">Cherry-pick MR</th>
            <th class="px-3 py-2">CP дата мержа</th>
            <th class="px-3 py-2">Статус</th>
          </tr>
        </thead>
        <tbody>
          ${items.map((item, i) => {
            const merged = item.merged_at ? new Date(item.merged_at).toLocaleString('ru-RU') : '—';
            const cpMerged = item.cherry_pick_merged_at ? new Date(item.cherry_pick_merged_at).toLocaleString('ru-RU') : '—';
            const cpMrLink = item.cherry_pick_mr_url
              ? `<a href="${item.cherry_pick_mr_url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs">Открыть</a>`
              : '<span class="text-slate-500 text-xs">—</span>';
            const statusBadge = item.cherry_pick_merged_at
              ? '<span class="inline-flex items-center bg-purple-900/40 text-purple-300 border border-purple-700 rounded-full px-2 py-0.5 text-xs font-medium">Cherry-picked</span>'
              : '<span class="text-slate-500 text-xs">—</span>';
            return `
              <tr class="border-b border-slate-700/50 hover:bg-slate-800/50">
                <td class="px-3 py-2 text-slate-500">${i + 1}</td>
                <td class="px-3 py-2">
                  <a href="${item.mr_url}" target="_blank" class="text-blue-400 hover:text-blue-300">!${item.mr_iid}</a>
                  <div class="text-xs text-slate-400 mt-0.5 truncate max-w-xs">${escapeHtml(item.mr_title)}</div>
                </td>
                <td class="px-3 py-2 text-slate-300">${escapeHtml(item.author)}</td>
                <td class="px-3 py-2 text-slate-300 whitespace-nowrap">${merged}</td>
                <td class="px-3 py-2">${cpMrLink}</td>
                <td class="px-3 py-2 text-slate-300 whitespace-nowrap text-xs">${cpMerged}</td>
                <td class="px-3 py-2">${statusBadge}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    document.getElementById('session-modal').classList.remove('hidden');
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('session-modal').classList.add('hidden');
}

async function deleteSession(id) {
  if (!confirm('Удалить запись из истории?')) return;
  try {
    const resp = await fetch(`/api/queue/history/${id}`, { method: 'DELETE' });
    if (resp.ok) loadHistory();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', loadHistory);
</script>
{% endblock %}
