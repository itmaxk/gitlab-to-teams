{% extends "base.html" %}
{% block title %}Compare — GitLab Manager{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Compare: MR по веткам</h1>

<!-- Form -->
<div class="bg-slate-800 border border-slate-700 rounded-lg p-4 mb-6">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Дата с</label>
      <input type="date" id="dateFrom" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Дата по</label>
      <input type="date" id="dateTo" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm">
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Ветки (через запятую)</label>
      <input type="text" id="branchesInput" placeholder="master, release/97, release/98"
             class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm">
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
    <div>
      <label class="block text-sm text-slate-400 mb-1">Поиск по Jira ID <span class="text-slate-500">(опционально)</span></label>
      <textarea id="jiraInput" rows="2"
        class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm font-mono focus:border-blue-500 focus:outline-none"
        placeholder="PROJ-6416, PROJ-6417&#10;https://jira.domain.com/browse/PROJ-6416&#10;или номера: 6416, 6417"></textarea>
    </div>
    <div>
      <label class="block text-sm text-slate-400 mb-1">Поиск по MR ID <span class="text-slate-500">(опционально)</span></label>
      <textarea id="mrInput" rows="2"
        class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white text-sm font-mono focus:border-blue-500 focus:outline-none"
        placeholder="123, 456, 789&#10;https://gitlab.domain.com/project/-/merge_requests/123"></textarea>
    </div>
  </div>
  <div class="flex items-center gap-4 flex-wrap">
    <button onclick="runCompare()" id="btnCompare"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-6 py-2 rounded-lg font-medium">
      Сравнить
    </button>
    <label class="inline-flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
      <input type="checkbox" id="includeChangeStats" checked
             class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-blue-600 focus:ring-blue-500">
      <span>Загружать diff-статистику</span>
    </label>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="hidden text-center py-8">
  <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-400"></div>
  <p class="text-slate-400 mt-2">Загрузка MR из GitLab...</p>
</div>

<!-- Error -->
<div id="errorBox" class="hidden bg-red-900/30 border border-red-700 rounded-lg p-4 mb-4 text-red-300"></div>

<!-- Results -->
<div id="results" class="hidden">
  <div id="stats" class="text-sm text-slate-400 mb-3"></div>

  <!-- Main table -->
  <div class="overflow-x-auto">
    <table class="w-full text-sm" id="compareTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- No-JIRA section -->
  <div id="noJiraSection" class="hidden mt-6">
    <h3 class="text-lg font-semibold text-slate-300 mb-2">Без JIRA ID</h3>
    <div id="noJiraContent"></div>
  </div>
</div>

<script>
const JIRA_URL = "{{ jira_url }}";
const JIRA_PROJECT = "{{ jira_project }}";

function today() {
  return new Date().toISOString().slice(0, 10);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

// Set defaults
document.getElementById("dateTo").value = today();
document.getElementById("dateFrom").value = daysAgo(30);

// Load default branches
fetch("/api/compare/default-branches")
  .then(r => r.json())
  .then(data => {
    if (data.branches && data.branches.length) {
      document.getElementById("branchesInput").value = data.branches.join(", ");
    }
  })
  .catch(() => {});

function parseJiraInput(raw) {
  return raw.split(/[\s,]+/).map(s => s.trim()).filter(Boolean).map(s => {
    const urlMatch = s.match(/\/browse\/([A-Za-z][\w-]*-\d+)/);
    if (urlMatch) return urlMatch[1];
    if (/^[A-Za-z][\w-]*-\d+$/.test(s)) return s;
    if (/^\d+$/.test(s) && JIRA_PROJECT) return `${JIRA_PROJECT}-${s}`;
    return s;
  });
}

function parseMrInput(raw) {
  return raw.split(/[\s,]+/).map(s => s.trim()).filter(Boolean).map(s => {
    const urlMatch = s.match(/\/merge_requests\/(\d+)/);
    if (urlMatch) return parseInt(urlMatch[1], 10);
    const n = parseInt(s.replace(/[^0-9]/g, ''), 10);
    return isNaN(n) || n <= 0 ? null : n;
  }).filter(n => n !== null);
}

async function runCompare() {
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo = document.getElementById("dateTo").value;
  const branchesRaw = document.getElementById("branchesInput").value;
  const jiraRaw = document.getElementById("jiraInput").value.trim();
  const mrRaw = document.getElementById("mrInput").value.trim();
  const includeChangeStats = document.getElementById("includeChangeStats").checked;

  const jira_ids = jiraRaw ? parseJiraInput(jiraRaw) : [];
  const mr_ids = mrRaw ? parseMrInput(mrRaw) : [];
  const hasIds = jira_ids.length > 0 || mr_ids.length > 0;

  if (!dateFrom && !hasIds) { alert("Укажите диапазон дат или список JIRA/MR ID"); return; }

  const branches = branchesRaw.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
  if (branches.length < 1) { alert("Укажите хотя бы одну ветку"); return; }

  const btn = document.getElementById("btnCompare");
  const loading = document.getElementById("loading");
  const errorBox = document.getElementById("errorBox");
  const results = document.getElementById("results");

  btn.disabled = true;
  btn.textContent = "Загрузка...";
  loading.classList.remove("hidden");
  errorBox.classList.add("hidden");
  results.classList.add("hidden");

  try {
    // If IDs specified — search only by IDs, ignore dates
    const body = { branches, include_change_stats: includeChangeStats };
    if (hasIds) {
      body.date_from = "";
      body.date_to = "";
      if (jira_ids.length) body.jira_ids = jira_ids;
      if (mr_ids.length) body.mr_ids = mr_ids;
    } else {
      body.date_from = dateFrom;
      body.date_to = dateTo || "";
    }

    const resp = await fetch("/api/compare/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || err.error || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderResults(data);
  } catch (e) {
    errorBox.textContent = "Ошибка: " + e.message;
    errorBox.classList.remove("hidden");
  } finally {
    btn.disabled = false;
    btn.textContent = "Сравнить";
    loading.classList.add("hidden");
  }
}

function statusBadge(status, mrs) {
  const cfg = {
    "direct":      { label: "Direct",      bg: "bg-green-900/30",  text: "text-green-400",  border: "border-green-700" },
    "cherry-pick": { label: "Cherry-pick",  bg: "bg-blue-900/30",   text: "text-blue-400",   border: "border-blue-700" },
    "manual":      { label: "Ручной",       bg: "bg-amber-900/30",  text: "text-amber-400",  border: "border-amber-700" },
    "missing":     { label: "Нет",          bg: "bg-red-900/30",    text: "text-red-400",    border: "border-red-700" },
  };
  const cfgDim = {
    "direct":      { label: "Direct",      bg: "bg-green-900/10",  text: "text-green-600",  border: "border-green-900" },
    "cherry-pick": { label: "Cherry-pick",  bg: "bg-blue-900/10",   text: "text-blue-600",   border: "border-blue-900" },
    "manual":      { label: "Ручной",       bg: "bg-amber-900/10",  text: "text-amber-600",  border: "border-amber-900" },
  };
  const c = cfg[status] || cfg.missing;

  if (status === "missing") {
    return `<span class="inline-block px-2 py-0.5 rounded text-xs ${c.bg} ${c.text} border ${c.border}">${c.label}</span>`;
  }

  const allOutOfRange = mrs.length > 0 && mrs.every(m => !m.in_range);
  const style = allOutOfRange ? (cfgDim[status] || c) : c;
  const chips = mrs.map(m => renderMrChip(m)).join("");

  return `<div class="inline-flex flex-col gap-1 rounded border ${style.border} ${style.bg} px-2 py-1 text-xs ${style.text}">
    <span class="font-medium leading-none">${style.label}</span>
    <div class="flex flex-col gap-1">${chips}</div>
  </div>`;
}

function renderMrChip(m) {
  const dim = !m.in_range;
  const title = m.mr_title || "";
  const stats = m.change_stats || {};
  const files = stats.files || [];
  const hasStats = Boolean(stats.loaded || stats.error);
  const groupBadge = m.cherry_pick_group
    ? `<span class="shrink-0 rounded border border-fuchsia-600/70 bg-fuchsia-950/55 px-1.5 py-0.5 text-[10px] font-semibold text-fuchsia-200" title="Связанная cherry-pick группа">CP#${m.cherry_pick_group}</span>`
    : "";
  const cherryPickMeta = renderCherryPickMeta(m);
  const statTitle = files.length
    ? files.map(f => `${f.path}: ${f.changed_lines}`).join("\n")
    : (stats.error ? `Diff недоступен: ${stats.error}` : "Нет данных по файлам");
  const fileCount = stats.file_count === null || stats.file_count === undefined ? "?" : stats.file_count;
  const lineCount = stats.total_changed_lines === null || stats.total_changed_lines === undefined ? "?" : stats.total_changed_lines;
  const topFiles = files.slice(0, 3).map(f => {
    const name = shortPath(f.path);
    return `<span class="inline-flex max-w-full items-center gap-1 rounded bg-slate-950/35 px-1.5 py-0.5 text-[10px] text-slate-300" title="${escHtml(f.path)}">
      <span class="truncate">${escHtml(name)}</span>
      <span class="text-slate-500">${f.changed_lines}</span>
    </span>`;
  }).join("");
  const more = files.length > 3
    ? `<span class="rounded bg-slate-950/35 px-1.5 py-0.5 text-[10px] text-slate-500">+${files.length - 3}</span>`
    : "";

  return `<div class="min-w-[12rem] max-w-[22rem] rounded-md border border-slate-700/80 bg-slate-950/25 px-2 py-1 ${dim ? 'opacity-60' : ''}">
    <div class="flex items-start gap-2">
      <a href="${m.mr_url}" target="_blank" class="shrink-0 font-mono text-blue-300 hover:underline" title="${escHtml(title)}${dim ? ' (вне диапазона дат)' : ''}">!${m.mr_iid}</a>
      ${groupBadge}
      <span class="min-w-0 flex-1 truncate text-slate-200" title="${escHtml(title)}">${escHtml(title)}</span>
      ${hasStats ? `<span class="shrink-0 rounded border border-slate-600 bg-slate-900 px-1.5 py-0.5 text-[10px] text-slate-300" title="${escHtml(statTitle)}">${fileCount}ф/${lineCount}±</span>` : ""}
    </div>
    ${cherryPickMeta}
    ${files.length ? `<div class="mt-1 flex max-w-full flex-wrap gap-1">${topFiles}${more}</div>` : ""}
  </div>`;
}

function renderCherryPickMeta(m) {
  if (m.cherry_pick_of) {
    return `<div class="mt-1 inline-flex max-w-full items-center gap-1 rounded border border-sky-600/60 bg-sky-950/45 px-1.5 py-0.5 text-[10px] text-sky-200">
      <span class="shrink-0">CP#${m.cherry_pick_group || m.cherry_pick_of.group || "?"} из</span>
      <a href="${m.cherry_pick_of.mr_url}" target="_blank" class="shrink-0 font-mono text-sky-100 hover:underline">!${m.cherry_pick_of.mr_iid}</a>
      <span class="min-w-0 truncate text-sky-300">${escHtml(m.cherry_pick_of.target_branch || "")}</span>
    </div>`;
  }

  const targets = m.cherry_picked_to || [];
  if (targets.length === 0) return "";

  const items = targets.map(target => `
    <span class="inline-flex max-w-full items-center gap-1 rounded border border-cyan-700/60 bg-cyan-950/35 px-1.5 py-0.5">
      <span class="min-w-0 truncate">${escHtml(target.target_branch || "")}</span>
      <a href="${target.mr_url}" target="_blank" class="shrink-0 font-mono text-cyan-100 hover:underline">!${target.mr_iid}</a>
    </span>`).join("");

  return `<div class="mt-1 flex max-w-full flex-wrap items-center gap-1 text-[10px] text-cyan-200">
    <span class="shrink-0 rounded bg-cyan-950/50 px-1.5 py-0.5 text-cyan-300">CP#${m.cherry_pick_group || targets[0].group || "?"} →</span>
    ${items}
  </div>`;
}

function shortPath(path) {
  if (!path) return "";
  const parts = path.split("/");
  if (parts.length <= 2) return path;
  return `${parts[0]}/.../${parts[parts.length - 1]}`;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

let lastData = null;

function copyCol(type, branchIdx) {
  if (!lastData) return;
  const branch = branchIdx !== undefined ? lastData.branches[branchIdx] : null;
  let items = [];
  for (const row of lastData.rows) {
    if (type === "jira") {
      items.push(row.jira_id);
      continue;
    }
    // type === "mr" — collect MR IDs for specific branch
    const info = row.branches[branch];
    if (info && info.mrs) {
      for (const m of info.mrs) items.push("!" + m.mr_iid);
    }
  }
  const unique = [...new Set(items)];
  navigator.clipboard.writeText(unique.join("\n"));
  return unique.length;
}

function flashBtn(btn, origHtml) {
  btn.innerHTML = "✓";
  setTimeout(() => { btn.innerHTML = origHtml; }, 1000);
}

function renderResults(data) {
  lastData = data;
  const { rows, branches, total_mrs, no_jira, change_stats_loaded } = data;
  const results = document.getElementById("results");
  const stats = document.getElementById("stats");

  stats.textContent = `Найдено ${rows.length} задач JIRA, ${total_mrs} MR по ${branches.length} веткам` +
    (change_stats_loaded ? "" : " · diff-статистика выключена");

  // Header with copy buttons
  const thead = document.getElementById("tableHead");
  const copyIcon = `<svg class="inline w-3.5 h-3.5 ml-1 opacity-50 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-width="2"/></svg>`;
  thead.innerHTML = `<tr class="border-b border-slate-700 text-left">
    <th class="py-2 px-3">
      <button onclick="copyCol('jira'); flashBtn(this, this.innerHTML)" class="group text-slate-400 hover:text-white font-medium cursor-pointer">JIRA${copyIcon}</button>
    </th>
    ${branches.map((b, i) => `<th class="py-2 px-3">
      <button onclick="copyCol('mr',${i}); flashBtn(this, this.innerHTML)" class="group text-slate-400 hover:text-white font-medium cursor-pointer">${escHtml(b)}${copyIcon}</button>
    </th>`).join("")}
  </tr>`;

  // Body
  const tbody = document.getElementById("tableBody");
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${branches.length + 1}" class="py-6 text-center text-slate-500">Нет данных за указанный период</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(row => {
      const jiraCell = row.jira_url
        ? `<a href="${row.jira_url}" target="_blank" class="text-blue-400 hover:underline font-mono">${escHtml(row.jira_id)}</a>`
        : `<span class="font-mono">${escHtml(row.jira_id)}</span>`;

      const branchCells = branches.map(b => {
        const info = row.branches[b] || { status: "missing", mrs: [] };
        return `<td class="py-2 px-3">${statusBadge(info.status, info.mrs || [])}</td>`;
      }).join("");

      return `<tr class="border-b border-slate-700/50 hover:bg-slate-800/50">\n<td class="py-2 px-3">${jiraCell}</td>\n${branchCells}\n</tr>`;
    }).join("");
  }

  // No-JIRA section
  const noJiraSection = document.getElementById("noJiraSection");
  const noJiraContent = document.getElementById("noJiraContent");
  const hasNoJira = no_jira && Object.keys(no_jira).length > 0;

  if (hasNoJira) {
    let html = '<div class="space-y-2">';
    for (const [branch, mrs] of Object.entries(no_jira)) {
      html += `<div class="bg-slate-800 border border-slate-700 rounded p-3">
        <div class="text-sm font-medium text-slate-300 mb-1">${escHtml(branch)}</div>
        <div class="flex flex-wrap gap-1">`;
      for (const mr of mrs) {
        html += renderMrChip(mr);
      }
      html += `</div></div>`;
    }
    html += '</div>';
    noJiraContent.innerHTML = html;
    noJiraSection.classList.remove("hidden");
  } else {
    noJiraSection.classList.add("hidden");
  }

  results.classList.remove("hidden");
}
</script>
{% endblock %}
