{% extends "base.html" %}
{% block title %}Sonar — GitLab Manager{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">SonarQube Issues</h1>

<div class="bg-slate-800 rounded-lg border border-slate-700 p-4 mb-6 space-y-4">
  <div class="grid grid-cols-3 gap-4">
    <div>
      <label class="block text-sm text-slate-400 mb-1">MR ID</label>
      <input type="text" id="mrId" placeholder="12767"
        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white font-mono text-sm focus:border-blue-500 focus:outline-none">
    </div>
    <div class="col-span-2">
      <label class="block text-sm text-slate-400 mb-1">GitLab MR URL</label>
      <input type="text" id="gitlabUrl" readonly
        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-slate-400 font-mono text-sm">
    </div>
  </div>

  <div>
    <label class="block text-sm text-slate-400 mb-1">SonarQube URL</label>
    <div class="flex gap-2">
      <input type="text" id="sonarUrl"
        class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white font-mono text-sm focus:border-blue-500 focus:outline-none">
      <a id="sonarLink" href="#" target="_blank" class="hidden text-blue-400 hover:text-blue-300 text-sm px-2 py-2 whitespace-nowrap">Открыть ↗</a>
    </div>
  </div>

  <div class="flex gap-2">
    <button onclick="handleFetchIssues()" id="btnFetch"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg cursor-pointer">
      Получить Issues
    </button>
    <button onclick="handlePostToGitlab()" id="btnPost"
      class="bg-green-600 hover:bg-green-700 text-white text-sm px-4 py-2 rounded-lg cursor-pointer hidden">
      Отправить в GitLab
    </button>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="hidden text-center py-8">
  <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-400"></div>
  <p class="text-slate-400 mt-2">Загрузка...</p>
</div>

<!-- Error -->
<div id="errorBox" class="hidden bg-red-900/30 border border-red-700 rounded-lg p-4 mb-4 text-red-300"></div>

<!-- Success -->
<div id="successBox" class="hidden bg-green-900/30 border border-green-700 rounded-lg p-4 mb-4 text-green-300"></div>

<!-- Results -->
<div id="results" class="hidden">
  <div class="bg-slate-800 rounded-lg border border-slate-700 p-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold">
        Issues <span id="issueCount" class="text-sm text-slate-400 font-normal"></span>
      </h2>
      <button onclick="copyIssues()" class="text-xs text-slate-400 hover:text-slate-300 border border-slate-600 px-2 py-1 rounded cursor-pointer">
        Копировать
      </button>
    </div>
    <pre id="issuesText" class="bg-slate-900 rounded-lg p-4 text-sm text-slate-300 overflow-x-auto whitespace-pre-wrap max-h-[600px] overflow-y-auto"></pre>
  </div>
</div>

<script>
const mrIdInput = document.getElementById('mrId');
const gitlabUrlInput = document.getElementById('gitlabUrl');
const sonarUrlInput = document.getElementById('sonarUrl');
const sonarLink = document.getElementById('sonarLink');

let currentIssues = '';
let config = {};

// Загружаем конфигурацию
fetch('/api/sonar/config').then(r => r.json()).then(c => {
  config = c;
  if (config.sonar_url && config.sonar_project) {
    sonarUrlInput.placeholder = `${config.sonar_url}/project/issues?id=${config.sonar_project}&pullRequest=...&issueStatuses=OPEN`;
  }
});

mrIdInput.addEventListener('input', () => {
  const id = mrIdInput.value.trim();
  if (!id) {
    gitlabUrlInput.value = '';
    sonarUrlInput.value = '';
    updateSonarLink();
    return;
  }
  if (config.gitlab_url && config.gitlab_project) {
    gitlabUrlInput.value = `${config.gitlab_url}/${config.gitlab_project}/-/merge_requests/${id}`;
  }
  if (config.sonar_url && config.sonar_project) {
    sonarUrlInput.value = `${config.sonar_url}/project/issues?id=${config.sonar_project}&pullRequest=${id}&issueStatuses=OPEN`;
  }
  updateSonarLink();
});

sonarUrlInput.addEventListener('input', updateSonarLink);

function updateSonarLink() {
  const url = sonarUrlInput.value.trim();
  if (url) {
    sonarLink.href = url;
    sonarLink.classList.remove('hidden');
  } else {
    sonarLink.classList.add('hidden');
  }
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.remove('hidden');
  document.getElementById('successBox').classList.add('hidden');
}

function showSuccess(msg) {
  const box = document.getElementById('successBox');
  box.textContent = msg;
  box.classList.remove('hidden');
  document.getElementById('errorBox').classList.add('hidden');
}

function hideMessages() {
  document.getElementById('errorBox').classList.add('hidden');
  document.getElementById('successBox').classList.add('hidden');
}

async function handleFetchIssues() {
  const sonarUrl = sonarUrlInput.value.trim();
  if (!sonarUrl) { showError('Введите SonarQube URL или MR ID'); return; }

  hideMessages();
  showLoading(true);
  document.getElementById('results').classList.add('hidden');

  try {
    const resp = await fetch('/api/sonar/fetch-issues', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sonar_url: sonarUrl }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Ошибка получения issues');

    currentIssues = data.data.issues;
    document.getElementById('issueCount').textContent = `(${data.data.count})`;
    document.getElementById('issuesText').textContent = currentIssues;
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('btnPost').classList.remove('hidden');
    showSuccess(`Получено issues: ${data.data.count}`);
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

async function handlePostToGitlab() {
  const mrId = mrIdInput.value.trim();
  const sonarUrl = sonarUrlInput.value.trim();
  if (!mrId) { showError('Введите MR ID'); return; }
  if (!currentIssues) { showError('Сначала получите issues'); return; }

  hideMessages();
  showLoading(true);
  try {
    const resp = await fetch('/api/sonar/post-comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mr_id: parseInt(mrId), sonar_url: sonarUrl, issues: currentIssues }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Ошибка отправки');
    showSuccess('Комментарий отправлен в GitLab MR');
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

function copyIssues() {
  navigator.clipboard.writeText(currentIssues).then(() => {
    showSuccess('Скопировано в буфер обмена');
  });
}
</script>
{% endblock %}
